<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Industrial - Grid & Flex</title>
    <link rel="stylesheet" href="css/style_avaliacao.css">
</head>
<body class="grid-layout">

    <header class="header">
        <h1>INDUSTRY OS</h1>
        <div class="user-flex">
            <span>Operador: #402</span>
            <button class="btn-sair">Sair</button>
        </div>
    </header>

    <aside class="sidebar">
        <nav class="nav-flex">
            <a href="#">🏠 Início</a>
            <a href="#">⚙️ Máquinas</a>
            <a href="#">📊 Histórico</a>
        </nav>
    </aside>

    <main class="main-content">
        <h2>Monitoramento em Tempo Real</h2>
        <div class="acoes-rapidas">
            <button class="btn">Pausar Esteira</button>
            <button class="btn">Reiniciar Sensores</button>
            <button class="btn">Relatório Diário</button>
        </div>
        <section class="cards-container">
            <div class="card">Sensor Térmico</div>
            <div class="card">Pressão Hidráulica</div>
            <div class="card">Carga Elétrica</div>
        </section>
    </main>

    <footer class="footer">
        <span>Status: Online</span>
        <span>Versão: 2.4.0</span>
    </footer>

</body>
</html>
